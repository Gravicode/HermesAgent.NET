version: "3.9"

# ─── Shared environment ────────────────────────────────────────────────────
x-hermes-env: &hermes-env
  HERMES_Llm__Provider:   ${HERMES_PROVIDER:-openai}
  HERMES_Llm__Model:      ${HERMES_MODEL:-gpt-4o}
  HERMES_Llm__ApiKey:     ${HERMES_API_KEY}
  HERMES_DataDirectory:   /data
  HERMES_Gateway__Telegram__BotToken: ${TELEGRAM_BOT_TOKEN:-}
  HERMES_Gateway__Discord__BotToken:  ${DISCORD_BOT_TOKEN:-}
  HERMES_Gateway__Webhook__SecretKey: ${WEBHOOK_SECRET:-}

services:

  # ── Interactive CLI ─────────────────────────────────────────────────────
  cli:
    build: .
    image: hermes-agent-dotnet:latest
    container_name: hermes-cli
    stdin_open: true
    tty: true
    volumes:
      - hermes-data:/data
    environment:
      <<: *hermes-env
    command: chat
    profiles: [cli]

  # ── REST / SSE API ──────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: src/HermesAgent.Web/Dockerfile
    image: hermes-web:latest
    container_name: hermes-web
    ports:
      - "${WEB_PORT:-7777}:8080"
    volumes:
      - hermes-data:/data
    environment:
      <<: *hermes-env
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Production
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    profiles: [web, full]

  # ── Messaging Gateway ───────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: src/HermesAgent.Gateway/Dockerfile
    image: hermes-gateway:latest
    container_name: hermes-gateway
    ports:
      - "${WEBHOOK_PORT:-7788}:7788"
    volumes:
      - hermes-data:/data
    environment:
      <<: *hermes-env
      HERMES_Gateway__Webhook__Enabled:  "true"
      HERMES_Gateway__Webhook__Port:     "7788"
      HERMES_Gateway__Telegram__Enabled: ${TELEGRAM_ENABLED:-false}
      HERMES_Gateway__Discord__Enabled:  ${DISCORD_ENABLED:-false}
    restart: unless-stopped
    profiles: [gateway, full]

volumes:
  hermes-data:
    driver: local
